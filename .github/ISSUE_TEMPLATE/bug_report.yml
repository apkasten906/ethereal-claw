name: Bug Report
description: Report a defect or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide a minimal reproduction.
      placeholder: |
        1. Run ...
        2. Execute ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js version, and relevant config.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Logs, screenshots, stack traces, or related links.
